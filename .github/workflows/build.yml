name: Nano Linux Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential wget cpio python3 unzip rsync bc libncurses-dev libelf-dev libssl-dev bison flex xorriso mtools libisoburn-dev gettext texinfo libwayland-dev libxkbcommon-dev libpixman-1-dev libgbm-dev
        
      - name: Build
        run: |
          rm -rf buildroot
          git clone --depth 1 --branch 2024.02 https://github.com/buildroot/buildroot.git
          
          # Копируем наш файл сразу на место .config
          # Это то, как ты хотел изначально
          cp nano_defconfig buildroot/.config
          
          cd buildroot
          # Перезаписываем пути в .config перед стартом сборки
          echo "BR2_ROOTFS_OVERLAY=\"${GITHUB_WORKSPACE}/board/nano_linux/rootfs-overlay\"" >> .config
          echo "BR2_ROOTFS_POST_BUILD_SCRIPT=\"${GITHUB_WORKSPACE}/post-build.sh\"" >> .config
          
          # Запуск сборки
          make olddefconfig
          make
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: nano-os-images
          path: buildroot/output/images/*
