name: Nano Linux Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential wget cpio python3 unzip rsync bc libncurses-dev libelf-dev libssl-dev bison flex xorriso mtools libisoburn-dev gettext texinfo libwayland-dev libxkbcommon-dev libpixman-1-dev libgbm-dev
      - name: Debug and Verify Paths
        run: |
          cd buildroot
          echo "--- DEBUG: Current Path ---"
          pwd
          
          # Проверяем файлы, используя полный путь через GITHUB_WORKSPACE
          # GITHUB_WORKSPACE = /home/runner/work/nano-linux/nano-linux/
          POST_SCRIPT="${GITHUB_WORKSPACE}/post-build.sh"
          OVERLAY_DIR="${GITHUB_WORKSPACE}/board/nano_linux/rootfs-overlay"
          
          echo "Checking $POST_SCRIPT"
          [ -f "$POST_SCRIPT" ] && echo "OK: post-build.sh found" || echo "ERROR: post-build.sh MISSING"
          
          echo "Checking $OVERLAY_DIR"
          [ -d "$OVERLAY_DIR" ] && echo "OK: rootfs-overlay found" || echo "ERROR: rootfs-overlay MISSING"
          
          
      - name: Build
        run: |
          rm -rf buildroot
          git clone --depth 1 --branch 2024.02 https://github.com/buildroot/buildroot.git
          
          # Копируем наш файл сразу на место .config
          # Это то, как ты хотел изначально
          cp nano_defconfig buildroot/.config
          
          # А ТЕПЕРЬ ТРЮК:
          # Мы отключаем проверку legacy через переменную окружения, 
          # если она вообще возможна, или просто принудительно делаем 
          # olddefconfig, чтобы он сам "починил" твой файл под свою версию
          cd buildroot
          make olddefconfig
          
          # Собираем
          make
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: nano-os-images
          path: buildroot/output/images/*
