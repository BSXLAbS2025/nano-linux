name: Nano Linux Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential wget cpio python3 unzip rsync bc libncurses-dev libelf-dev libssl-dev bison flex xorriso mtools libisoburn-dev genisoimage mtools gettext texinfo libwayland-dev libxkbcommon-dev libpixman-1-dev libgbm-dev
        
      - name: Build
        run: |
          git clone --depth 1 --branch 2024.02 https://github.com/buildroot/buildroot.git
          
          echo "--- ГДЕ МЫ СЕЙЧАС? ---"
          pwd
          echo "--- ЧТО В ЭТОЙ ПАПКЕ? ---"
          ls -F
         
          # Находим папку с buildroot (ищем любую папку, которая содержит Makefile)
          BUILDROOT_DIR=$(find . -maxdepth 2 -name "Makefile" -exec dirname {} \;)
          
          if [ -z "$BUILDROOT_DIR" ]; then
            echo "КАТАСТРОФА: Buildroot не найден!"
            exit 1
          fi
          
          echo "Buildroot найден в: $BUILDROOT_DIR"
          cd "$BUILDROOT_DIR"
          
          # Продолжаем сборку в найденной папке
          cp ../nano_defconfig configs/nano_defconfig
          make nano_defconfig
          make

 
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: nano-os
          path: buildroot/output/images/*
