name: Nano Linux Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential wget cpio python3 unzip rsync bc libncurses-dev libelf-dev libssl-dev bison flex xorriso mtools libisoburn-dev genisoimage mtools gettext texinfo libwayland-dev libxkbcommon-dev libpixman-1-dev libgbm-dev
        
      - name: Build
        run: |
          git clone --depth 1 --branch 2026.02 https://github.com/buildroot/buildroot.git
          
          cd buildroot
          
          # 1. Применяем твой конфиг
          cp ../nano_defconfig configs/nano_defconfig
          make nano_defconfig
          
          # 2. СИЛОВОЕ ВКЛЮЧЕНИЕ ОБРАЗОВ (заменяем если есть, добавляем если нет)
          sed -i 's/.*BR2_TARGET_ROOTFS_CPIO.*/BR2_TARGET_ROOTFS_CPIO=y/' .config
          sed -i 's/.*BR2_TARGET_ROOTFS_ISO9660.*/BR2_TARGET_ROOTFS_ISO9660=y/' .config
          
          # 3. Инжектим оверлей и фиксим права
          sed -i 's|.*BR2_ROOTFS_OVERLAY.*|BR2_ROOTFS_OVERLAY="'${GITHUB_WORKSPACE}'/board/nano_linux/rootfs-overlay"|' .config
          chmod +x "${GITHUB_WORKSPACE}/board/nano_linux/rootfs-overlay/usr/bin/status-bar.sh"
          
          # 4. Обновляем зависимости конфига
          make olddefconfig
          
          # 5. Сборка
          make
 
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: nano-os
          path: buildroot/output/images/*
